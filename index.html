<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow | Student Task Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>TaskFlow</h1>

<p class="subtitle">
Stay productive and track your daily goals
</p>

<div class="welcome">

📚 Today is a great day to finish your tasks

</div>
<div class="task-input">

<input
type="text"
id="taskInput"
placeholder="Add a new task..."
>

<button id="addBtn">
Add
</button>

</div>

<div class="stats">

<p>
Completed:
<span id="completedCount">
0
</span>
</p>

<p>
Total:
<span id="totalCount">
0
</span>
</p>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>

</html>
